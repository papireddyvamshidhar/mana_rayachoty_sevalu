name: mana_rayachoty_sevalu
description: "Professional service app: mana rayachoty sevalu. Created by Vamshi Reddy."
publish_to: 'none'
version: 1.0.0+15

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_app_check: ^0.2.1+8
  intl: ^0.19.0
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  shared_preferences: ^2.2.0
  translator: ^1.0.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#5B3DF5"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/splash.png
  android_12:
    color: "#ffffff"
    image: assets/splash.png